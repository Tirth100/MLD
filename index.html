<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meeting Leech Detector</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="col-md-5 col-lg-4">
            <div class="card glass-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="logo-icon mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-radar text-primary" viewBox="0 0 16 16">
                                <path d="M6.634 1.135A7 7 0 0 1 15 8a.5.5 0 0 1-1 0 6 6 0 1 0-6.5 5.98v-1.005A5 5 0 1 1 13 8a.5.5 0 0 1-1 0 4 4 0 1 0-4.5 3.969v-1.011A2.999 2.999 0 1 1 11 8a.5.5 0 0 1-1 0 2 2 0 1 0-2.5 1.936v-1.07a1 1 0 1 1 1.086-1.545A1.5 1.5 0 1 0 8 6.5C8 7.329 8.671 8 9.5 8c.288 0 .559-.08.783-.217l.86 2.053a.5.5 0 0 1-.418.665h-.069l-1.054-1.054A2.5 2.5 0 0 1 7.5 10.5C6.12 10.5 5 9.38 5 8s1.12-2.5 2.5-2.5c.98 0 1.815.548 2.228 1.341l.889-1.332A3.5 3.5 0 0 0 7.5 4.5C5.567 4.5 4 6.067 4 8s1.567 3.5 3.5 3.5c.348 0 .684-.05 1.002-.143l1.173 1.173A4.985 4.985 0 0 1 7.5 13C4.739 13 2.5 10.761 2.5 8S4.739 3 7.5 3c1.077 0 2.072.337 2.872.915l1.657-2.071c-.961-.662-2.115-1.058-3.35-1.127z"/>
                            </svg>
                        </div>
                        <h2 class="fw-bold mb-1">Meeting Leech Detector</h2>
                        <p class="text-muted">Sign in to your account</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="roleSelect" class="form-label">Role</label>
                            <select class="form-select custom-select" id="roleSelect" required>
                                <option value="" disabled selected>Select your role</option>
                                <option value="manager">Manager</option>
                                <option value="employee">Employee</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm login-btn">
                            Sign In
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-muted small">&copy; 2026 MLD Systems</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
